<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DriveeUP</title>
  <style>
    :root { color-scheme: dark; }
    body { margin: 0; font-family: sans-serif; background: #0f1622; color: #fff; }
    .wrap { max-width: 420px; margin: 40px auto; padding: 20px; background: #192536; border-radius: 16px; }
    h1 { margin: 0 0 8px; }
    p { color: #c5d4ec; }
    input, select, button { width: 100%; margin-top: 10px; padding: 10px; border-radius: 10px; border: none; }
    button { background: #30b8ff; color: #001320; font-weight: 700; cursor: pointer; }
    .secondary { background: #2a3f5c; color: #fff; }
    pre { white-space: pre-wrap; background: #0b1119; padding: 12px; border-radius: 10px; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>DriveeUP</h1>
    <p>Игровая система лояльности Drivee</p>

    <input id="email" type="email" placeholder="Email" />
    <input id="password" type="password" placeholder="Пароль (мин. 6)" />
    <select id="role">
      <option value="PASSENGER">Пассажир</option>
      <option value="DRIVER">Водитель</option>
    </select>

    <button onclick="register()">Регистрация</button>
    <button class="secondary" onclick="login()">Вход</button>
    <button class="secondary" onclick="me()">Профиль</button>

    <pre id="result">Готово к работе</pre>
  </div>

  <script>
    const API_BASE = '/api';
    let token = localStorage.getItem('token') || '';
    const resultEl = document.getElementById('result');

    function body() {
      return {
        email: document.getElementById('email').value,
        password: document.getElementById('password').value,
        role: document.getElementById('role').value
      };
    }

    async function register() {
      const res = await fetch(`${API_BASE}/auth/register`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body())
      });
      const data = await res.json();
      if (data.accessToken) { token = data.accessToken; localStorage.setItem('token', token); }
      resultEl.textContent = JSON.stringify(data, null, 2);
    }

    async function login() {
      const b = body();
      const res = await fetch(`${API_BASE}/auth/login`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email: b.email, password: b.password })
      });
      const data = await res.json();
      if (data.accessToken) { token = data.accessToken; localStorage.setItem('token', token); }
      resultEl.textContent = JSON.stringify(data, null, 2);
    }

    async function me() {
      const res = await fetch(`${API_BASE}/auth/me`, { headers: { Authorization: `Bearer ${token}` } });
      const data = await res.json();
      resultEl.textContent = JSON.stringify(data, null, 2);
    }
  </script>
</body>
</html>
