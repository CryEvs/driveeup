services:
  mysql:
    image: mysql:8.4
    command: ["--max_connections=80", "--innodb_buffer_pool_size=256M"]
    environment:
      MYSQL_DATABASE: ${DB_NAME:-driveeup}
      MYSQL_USER: ${DB_USER:-driveeup}
      MYSQL_PASSWORD: ${DB_PASSWORD:-driveeup_pass}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root_pass}
    volumes:
      - mysql_data:/var/lib/mysql
    mem_limit: 600m
    cpus: 1.0
    restart: unless-stopped

  phpmyadmin:
    image: phpmyadmin:5-apache
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
    depends_on:
      - mysql
    ports:
      - "8081:80"
    mem_limit: 180m
    cpus: 0.5
    restart: unless-stopped

  backend:
    build: ./backend
    working_dir: /var/www/html
    environment:
      APP_ENV: production
      APP_DEBUG: false
      APP_URL: https://driveeup.ru
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_NAME:-driveeup}
      DB_USERNAME: ${DB_USER:-driveeup}
      DB_PASSWORD: ${DB_PASSWORD:-driveeup_pass}
    depends_on:
      - mysql
    mem_limit: 500m
    cpus: 1.0
    restart: unless-stopped

  frontend:
    build: ./frontend
    mem_limit: 220m
    cpus: 0.5
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - backend
      - frontend
    volumes:
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt
    ports:
      - "80:80"
      - "443:443"
    mem_limit: 120m
    cpus: 0.5
    restart: unless-stopped

  certbot:
    image: certbot/certbot:latest
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt

volumes:
  mysql_data:
  certbot_www:
  certbot_conf:
