spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:mysql}:${DB_PORT:3306}/${DB_NAME:driveeup}
    username: ${DB_USER:driveeup}
    password: ${DB_PASSWORD:driveeup_pass}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

server:
  port: 8080

app:
  jwt:
    secret: ${JWT_SECRET:change-this-secret-to-very-long-random-string}
    access-expiration-minutes: 120
